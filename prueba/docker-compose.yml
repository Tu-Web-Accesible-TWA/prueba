services:
  # Tu aplicación Angular
  angular-app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8080"

  # Servidor Caddy para red local
  gateway:
    image: caddy:2.7-alpine
    restart: unless-stopped
    ports:
      - "80:80"     # HTTP
      - "443:443"   # HTTPS
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - angular-app

volumes:
  caddy_data:
  caddy_config: