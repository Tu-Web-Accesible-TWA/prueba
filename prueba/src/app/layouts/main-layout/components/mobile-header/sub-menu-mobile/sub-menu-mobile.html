<div class="menu-overlay" [class.is-open]="isVisible()">
  <div class="menu-content">
    <div class="menu-header">
      @if (!isRoot()) {
        <button class="back-btn" (click)="goBack.emit()">
          <i class="fa-solid fa-chevron-left"></i> Volver
        </button>
      }
      <button class="close-btn" (click)="handleClose()" aria-label="Cerrar Menu">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <ul class="menu-list">
      @for (item of items(); track $index) {
        <li class="menu-item">
          @if (item.items && item.items.length > 0) {
            <button class="item-wrapper" (click)="toggleChild($index)">
              <div class="label-group">
                @if (item.iconClass) { <i [class]="item.iconClass"></i> }
                <span>{{ item.label }}</span>
              </div>
              <i class="fa-solid fa-angle-right"></i>
            </button>

            <app-sub-menu-mobile 
              [items]="item.items"
              [isVisible]="activeChildIndex() === $index"
              [isRoot]="false"
              (goBack)="toggleChild(null)"
              (closeMenu)="handleClose()">
            </app-sub-menu-mobile>

          } @else {
            <a [routerLink]="item.url" (click)="handleClose()">
              <div class="label-group">
                @if (item.iconClass) { <i [class]="item.iconClass"></i> }
                <span>{{ item.label }}</span>
              </div>
            </a>
          }
        </li>
      }
    </ul>
  </div>
</div>
