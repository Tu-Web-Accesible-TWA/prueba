<a routerLink='{{linkUrl()}}'>
  <div class="u-box">
    <ng-content select="[icon]"></ng-content>
    <h2 class="title-box">{{title()}}</h2>
    <div>
      <p class="text-box">{{description()}}</p>
    </div>
    <span class="feature-link">
      <span>{{linkText()}}</span>

      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path
          d="M10.1433 6.16664L5.67333 1.69664L6.85167 0.518311L13.3333 6.99998L6.85167 13.4816L5.67333 12.3033L10.1433 7.83331H0V6.16664H10.1433Z"
          fill="#337F37"></path>
      </svg>
    </span>
  </div>
</a>
