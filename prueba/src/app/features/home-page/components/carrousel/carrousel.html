<section class="swiper-viewport">
  <swiper-container #swiper init="false">
    
    <swiper-slide><app-slide-depositos /></swiper-slide>
    <swiper-slide><app-slide-depositos-1 /></swiper-slide>
    <swiper-slide><app-slide-depositos-1 /></swiper-slide>
  </swiper-container>

  <div class="swiper-controls">
    <button (click)="toggleAutoplay()" class="autoplay-toggle" role="group" aria-label="Control de reproducción y pausa de promociones" tabindex="0">
      <i [class]="isPlaying() ? 'fa-solid fa-pause' : 'fa-solid fa-play'"></i>
    </button>
    
    <div #pagination class="swiper-pagination" role="group" aria-label="Control de promociones"></div>
  </div>
</section>
