<article class="info-card">
  <h3 class="info-card-title">{{ title() }}</h3>
  <p class="info-card-description">{{ description() }}</p>
  <div class="info-card-image-wrapper">
    <img
      class="info-card-image"
      [src]="image()"
      [alt]="imageAlt()"
      loading="lazy"
      decoding="async"
    />
  </div>
</article>
