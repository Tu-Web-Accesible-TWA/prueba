<section
  class="features-section"
  aria-labelledby="features-heading"
>
  <h2 id="features-heading" class="visually-hidden">
    Ventajas para concesionarios
  </h2>

  <ul class="features-grid" role="list">
    @for (item of features(); track item.title) {
      <li class="features-grid-item">
        <app-concesionarios-feature-item
          [icon]="item.icon"
          [title]="item.title"
          [description]="item.description"
        />
      </li>
    }
  </ul>
</section>
