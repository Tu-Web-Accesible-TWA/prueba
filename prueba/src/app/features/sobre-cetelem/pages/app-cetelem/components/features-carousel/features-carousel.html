<section
  class="features-carousel-section"
  aria-labelledby="features-carousel-heading"
>
  <h2 class="features-carousel-heading" id="features-carousel-heading">
    {{ heading() }}
  </h2>

  <div class="features-carousel-controls" aria-hidden="true">
    <button
      type="button"
      class="features-carousel-control"
      (click)="scrollBy(-1)"
      aria-label="Ver elementos anteriores"
    >
      <span class="features-carousel-control-icon">‹</span>
    </button>
    <button
      type="button"
      class="features-carousel-control"
      (click)="scrollBy(1)"
      aria-label="Ver más elementos"
    >
      <span class="features-carousel-control-icon">›</span>
    </button>
  </div>

  <ul
    #track
    class="features-carousel-track"
    role="list"
    tabindex="0"
    aria-label="Funcionalidades de la APP Cetelem"
  >
    @for (item of features(); track item.id) {
      <li class="features-carousel-item">
        <app-cetelem-feature-card
          [id]="item.id"
          [title]="item.title"
          [description]="item.description"
          [image]="item.image"
          [imageAlt]="item.imageAlt"
          [videoUrl]="item.videoUrl"
          [videoText]="item.videoText"
        />
      </li>
    }
  </ul>
</section>
